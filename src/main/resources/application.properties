# ========================================
# Application
# ========================================
spring.application.name=api
server.port=8080

# ========================================
# Database (local development)
# Docker maps MySQL to port 3307 on the host
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3307/optima_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=optima_user
spring.datasource.password=optima_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========================================
# Mail (SMTP) - PLACEHOLDERS, configure later
# ========================================
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your_email@example.com
spring.mail.password=your_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================================
# JWT - PLACEHOLDER, replace with a strong secret later
# ========================================
app.jwt.secret=change_this_to_a_long_random_secret_at_least_256_bits
app.jwt.expiration-ms=86400000